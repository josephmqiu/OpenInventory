name: R2 Diag

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect wrangler account + buckets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Hardcoded (not a secret — appears in the S3 endpoint URL). Removes the
          # mis-entered CLOUDFLARE_ACCOUNT_ID secret from the equation.
          CLOUDFLARE_ACCOUNT_ID: ae6a595acecf774d7a0eae795b41c236
        run: |
          echo "ACCOUNT_ID length (expect 32): ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo "=== r2 bucket list (remote) ==="
          npx --yes wrangler r2 bucket list --remote || true
          echo "=== test object put ==="
          echo "diag $(date -u)" > diag.txt
          npx --yes wrangler r2 object put "openinventory-releases/diag.txt" --file=diag.txt --remote || true
