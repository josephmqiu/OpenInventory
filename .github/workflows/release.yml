name: Release

on:
  push:
    tags:
      - "v*"

# Needs write access to create/publish the GitHub release and upload assets.
permissions:
  contents: write

jobs:
  test-suite:
    uses: ./.github/workflows/test-suite.yml

  # ── Build each platform natively (no cross-compile). better-sqlite3 is rebuilt
  #    from source per runner. Each job smoke-launches its packaged artifact (which
  #    also proves the native module loads) and uploads its dist output as a
  #    workflow artifact. NOTHING is uploaded to the release here — a single
  #    assembly job owns that, so a failed platform never leaves a partial release.
  build:
    needs: test-suite
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            ebflag: "--win"
          - os: macos-latest
            platform: mac
            ebflag: "--mac"
          - os: ubuntu-latest
            platform: linux
            ebflag: "--linux"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild native modules for Electron
        run: npx tsx scripts/rebuild-electron-native-deps.ts
      - name: Build app
        run: npm run build && npx electron-builder ${{ matrix.ebflag }} --publish never

      # ── Per-platform launch smoke. --smoke-test initialises the DB (exercising
      #    better-sqlite3's native binary) and exits 0; a bad ABI fails here, not in
      #    the field. Each launches the REAL packaged artifact, not an unpacked dir.
      - name: Smoke test (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\win-unpacked\*.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in dist/win-unpacked/" }
          $tempDir = Join-Path $env:TEMP "oi-smoke-$(Get-Random)"
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--smoke-test","--user-data-dir=$tempDir" -PassThru
          $proc | Wait-Process -Timeout 90 -ErrorAction SilentlyContinue
          if (-not $proc.HasExited) { $proc.Kill(); throw "Smoke test timed out after 90 seconds" }
          if ($proc.ExitCode -ne 0) { throw "Smoke test failed with exit code $($proc.ExitCode)" }
          Remove-Item -Recurse -Force $tempDir -ErrorAction SilentlyContinue

      - name: Smoke test (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          BIN=$(find dist/mac* -maxdepth 3 -type f -path '*/Contents/MacOS/*' | head -n1)
          if [ -z "$BIN" ]; then echo "No packaged .app binary found in dist/mac*" >&2; exit 1; fi
          TMP=$(mktemp -d)
          "$BIN" --smoke-test --user-data-dir="$TMP" &
          PID=$!
          ( sleep 90 && kill -9 $PID 2>/dev/null ) & WATCH=$!
          set +e; wait $PID; CODE=$?; set -e
          kill -9 $WATCH 2>/dev/null || true
          if [ "$CODE" -ne 0 ]; then echo "macOS smoke test failed (exit $CODE)" >&2; exit 1; fi

      - name: Smoke test (Linux AppImage)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb >/dev/null
          APP=$(ls dist/*.AppImage | head -n1)
          if [ -z "$APP" ]; then echo "No .AppImage found in dist/" >&2; exit 1; fi
          chmod +x "$APP"
          TMP=$(mktemp -d)
          # --appimage-extract-and-run avoids the FUSE dependency on ubuntu-latest.
          xvfb-run -a "$APP" --appimage-extract-and-run --smoke-test --user-data-dir="$TMP" &
          PID=$!
          ( sleep 90 && kill -9 $PID 2>/dev/null ) & WATCH=$!
          set +e; wait $PID; CODE=$?; set -e
          kill -9 $WATCH 2>/dev/null || true
          if [ "$CODE" -ne 0 ]; then echo "Linux smoke test failed (exit $CODE)" >&2; exit 1; fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          # latest*.yml is included so the assembly job can pick the auto-update
          # manifests it wants (and deliberately drop latest-mac.yml).
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/latest*.yml
          if-no-files-found: error

  # ── Single owner of the GitHub release. Collects every platform's artifacts,
  #    uploads the EXACT expected asset list, then flips the release published LAST
  #    so clients never resolve a half-uploaded release.
  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Flatten every platform artifact into one dir.
          find artifacts -type f -exec cp {} release-assets/ \;
          # macOS is manual-download only (unsigned cannot auto-update via Squirrel.Mac),
          # so DO NOT ship latest-mac.yml — its presence would make mac clients attempt a
          # doomed signature-failing install.
          rm -f release-assets/latest-mac.yml
          echo "Release assets:"; ls -la release-assets
      - name: Upload assets and publish the release
        shell: bash
        run: |
          set -euo pipefail
          # The release is normally created as a DRAFT (with changelog notes) by the
          # ship/tag flow. If it does not exist yet, create it as a draft so assets are
          # never visible before they are complete.
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release create "$REF_NAME" --draft --title "$REF_NAME" --generate-notes
          fi
          gh release upload "$REF_NAME" release-assets/* --clobber
          # Publish LAST — this is the atomic activation point for the GitHub channel.
          gh release edit "$REF_NAME" --draft=false --latest

  # ── ONE-TIME MIGRATION BRIDGE (Windows only). Mirrors the Windows artifacts to the
  #    legacy Cloudflare R2 feed so the existing installed Windows base (which has the
  #    R2 URL baked into app-update.yml) picks up 0.3.0 and flips to the GitHub channel.
  #    Mac/Linux are net-new (no R2 base), so they are GitHub-only. REMOVE this job once
  #    the field has confirmed machines are RUNNING the migrated build.
  bridge-r2:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-win
          path: dist
      - name: Mirror Windows release to R2
        shell: pwsh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $publicBase = 'https://pub-ecaf9dac2f994b1eb42181e6e551d3c3.r2.dev'
          $bucket = 'openinventory-releases'

          $latestYml = Join-Path 'dist' 'latest.yml'
          if (-not (Test-Path $latestYml)) { throw "latest.yml not found in dist/" }

          function Upload-Artifact($file) {
            Write-Host "Uploading $($file.Name)"
            npx --yes wrangler r2 object put "$bucket/$($file.Name)" --file="$($file.FullName)" --remote
            if ($LASTEXITCODE -ne 0) { throw "R2 upload failed for $($file.Name)" }
          }

          function Assert-Readable($url) {
            for ($i = 1; $i -le 4; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri $url -Method Head -TimeoutSec 30 -UseBasicParsing
                if ($resp.StatusCode -eq 200) { Write-Host "Readable: $url"; return }
                throw "HTTP $($resp.StatusCode)"
              } catch {
                if ($i -eq 4) { throw "Artifact not publicly readable after 4 tries: $url ($($_.Exception.Message))" }
                Write-Host "Not yet readable ($url), retry $i..."; Start-Sleep -Seconds 5
              }
            }
          }

          # 1. Upload the payload (installer + blockmap) BEFORE the activation pointer.
          #    We verify the ACTUAL uploaded filenames (no fragile latest.yml regex).
          $payload = Get-ChildItem -Path 'dist' -File | Where-Object { $_.Extension -eq '.exe' -or $_.Name -like '*.exe.blockmap' }
          if (-not $payload) { throw "No payload artifacts (.exe/.blockmap) found in dist/" }
          foreach ($a in $payload) { Upload-Artifact $a }

          # 2. Verify every uploaded payload file is publicly readable BEFORE flipping latest.yml.
          foreach ($a in $payload) { Assert-Readable "$publicBase/$($a.Name)" }

          # 3. Upload latest.yml LAST — the pointer that activates the release.
          Upload-Artifact (Get-Item $latestYml)

          # 4. Confirm the canonical R2 pointer resolves to THIS build (read straight from R2,
          #    no edge cache). Parse the version line; do not trust edge lag.
          $expected = "$env:REF_NAME".TrimStart('v')
          $verifyFile = Join-Path $env:TEMP "latest-verify-$([Guid]::NewGuid()).yml"
          npx --yes wrangler r2 object get "$bucket/latest.yml" --file="$verifyFile" --remote
          if ($LASTEXITCODE -ne 0) { throw "Could not read back $bucket/latest.yml from R2" }
          $canonical = Get-Content $verifyFile -Raw
          Remove-Item $verifyFile -ErrorAction SilentlyContinue
          if ($canonical -notmatch "(?m)^version:\s*$([regex]::Escape($expected))\s*$") {
            throw "Uploaded latest.yml in R2 does not contain expected version $expected — upload botched"
          }
          Write-Host "Canonical R2 latest.yml confirmed at version $expected."

          # 5. Public-edge consumability — clients fetch from the r2.dev edge. Distinguish
          #    stale-but-readable (benign edge lag) from never-readable (real breakage).
          $edgeReadable = $false; $edgeVersionOk = $false
          for ($i = 1; $i -le 6; $i++) {
            try {
              $bust = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
              $pointer = Invoke-WebRequest -Uri "$publicBase/latest.yml?cb=$bust" -Headers @{ 'Cache-Control' = 'no-cache' } -TimeoutSec 30 -UseBasicParsing
              if ($pointer.StatusCode -eq 200) {
                $edgeReadable = $true
                if ($pointer.Content -match "(?m)^version:\s*$([regex]::Escape($expected))\s*$") { $edgeVersionOk = $true; break }
              }
            } catch { }
            Start-Sleep -Seconds 10
          }
          if ($edgeVersionOk) {
            Write-Host "Bridge release $expected published and verified consumable (canonical + edge)."
          } elseif ($edgeReadable) {
            Write-Warning "Public latest.yml is readable but served a stale version after retries. Canonical R2 object is correct at $expected; edge will catch up. Not failing."
          } else {
            throw "Public latest.yml at $publicBase is not readable after retries — existing Windows clients cannot consume the bridge (check R2 routing/ACL/caching)."
          }
