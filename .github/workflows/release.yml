name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test-suite:
    uses: ./.github/workflows/test-suite.yml

  build-mac:
    needs: [test-suite]
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -o better-sqlite3
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: npm run build && npx electron-builder --mac --${{ matrix.arch }} --publish always

  build-windows:
    needs: [test-suite]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -o better-sqlite3
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --win --publish always
      - name: Smoke test packaged app
        shell: pwsh
        run: |
          # Use the unpacked app exe, not the NSIS installer
          $exe = Get-ChildItem dist\win-unpacked\*.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in dist/win-unpacked/" }
          $tempDir = Join-Path $env:TEMP "oi-smoke-$(Get-Random)"
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--smoke-test","--user-data-dir=$tempDir" -PassThru
          $proc | Wait-Process -Timeout 60 -ErrorAction SilentlyContinue
          if (-not $proc.HasExited) { $proc.Kill(); throw "Smoke test timed out after 60 seconds" }
          if ($proc.ExitCode -ne 0) { throw "Smoke test failed with exit code $($proc.ExitCode)" }
          Remove-Item -Recurse -Force $tempDir -ErrorAction SilentlyContinue
