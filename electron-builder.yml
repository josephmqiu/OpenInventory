appId: com.openinventory.app
productName: OpenInventory
copyright: "Copyright © 2026 OpenInventory"
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!{vitest.config.ts,vitest.config.node.ts}"
  - "!{test,e2e,scripts}"
asarUnpack:
  - "**/*.node"
  - "out/renderer/**/*"
publish:
  provider: github
  owner: danrepo
  repo: OpenInventory
mac:
  category: public.app-category.business
  artifactName: "${productName}-${version}-${arch}.${ext}"
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
