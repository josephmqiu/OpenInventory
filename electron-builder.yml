appId: com.openinventory.app
productName: OpenInventory
copyright: "Copyright © 2026 OpenInventory"
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!{vitest.config.ts,vitest.config.node.ts,vitest.coverage.config.ts}"
  - "!{test,e2e,scripts}"
  # Project files that should not ship
  - "!{coverage,.dev-data,.gstack,.claude,docs}"
  - "!{DESIGN.md,CLAUDE.md,VERSION,TODOS.md}"
  - "!.husky"
  # Strip junk inside node_modules
  - "!**/node_modules/**/coverage/**"
  - "!**/node_modules/**/docs/**"
  - "!**/node_modules/**/*.md"
  # Strip better-sqlite3 build artifacts (21MB → ~2MB)
  - "!node_modules/better-sqlite3/build/Release/obj*"
  - "!node_modules/better-sqlite3/build/Release/sqlite3.a"
  - "!node_modules/better-sqlite3/deps"
  - "!node_modules/better-sqlite3/src"
  # Strip TypeScript declarations (not needed at runtime)
  - "!**/node_modules/*/dist/dts"
  - "!**/node_modules/@*/*/dist/dts"
asarUnpack:
  - "**/*.node"
  - "out/renderer/**/*"
publish:
  provider: github
  owner: danrepo
  repo: OpenInventory
mac:
  category: public.app-category.business
  artifactName: "${productName}-${version}-${arch}.${ext}"
  identity: null # REMOVEME: re-enable codesigning once CSC secrets are configured in CI
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
