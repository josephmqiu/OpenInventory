appId: com.openinventory.app
productName: OpenInventory
copyright: "Copyright © 2026 OpenInventory"
npmRebuild: false
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
  - "!{vitest.config.ts,vitest.config.node.ts,vitest.coverage.config.ts}"
  - "!{test,e2e,scripts}"
  # Project files that should not ship
  - "!{coverage,.dev-data,.gstack,.claude,docs}"
  - "!{DESIGN.md,CLAUDE.md,VERSION,TODOS.md}"
  - "!.husky"
  # node_modules: only better-sqlite3 + electron-updater remain in dependencies,
  # so electron-builder only packs those (+ their transitive production deps).
  # Strip better-sqlite3 build artifacts that leak into the ASAR.
  - "!node_modules/better-sqlite3/build/Release/obj*"
  - "!node_modules/better-sqlite3/build/Release/sqlite3.a"
  - "!node_modules/better-sqlite3/deps"
  - "!node_modules/better-sqlite3/src"
  - "!node_modules/better-sqlite3/prebuilds"
  # Strip build-time transitive deps of better-sqlite3 (not needed at runtime)
  - "!node_modules/prebuild-install/**"
  - "!node_modules/node-abi/**"
  - "!node_modules/tar-stream/**"
  - "!node_modules/pump/**"
  - "!node_modules/detect-libc/**"
  - "!node_modules/simple-get/**"
  - "!node_modules/napi-build-utils/**"
  - "!node_modules/github-from-package/**"
  - "!node_modules/rc/**"
asarUnpack:
  - "**/*.node"
  - "out/renderer/**/*"
publish:
  provider: github
  owner: josephmqiu
  repo: OpenInventory
  releaseType: release
mac:
  category: public.app-category.business
  artifactName: "${productName}-${version}-${arch}.${ext}"
  identity: null # macOS ships unsigned; set CSC_LINK / CSC_KEY_PASSWORD (+ notarization) to enable signing. Unsigned mac cannot auto-update — shipped as manual download.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
linux:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
